  - claim_id: "C6-mirror-y-ood-stress"
    status: "observed"
    scope: "one-SUT / one-checkpoint / one-MR (mirror-y) / bounded within-SUT frame-level approximate OOD-stress rate over one eval trajectory's 10 frames"
    evidence:
      - "research_assets/runs/mirror-y-ood-stress-pilot/raw/precondition_report.json"
      - "research_assets/runs/mirror-y-rate-upgrade/manifest.yml"
      - "research_assets/runs/mirror-y-rate-upgrade/raw/metric_ledger.json"
      - "research_assets/runs/mirror-y-rate-upgrade/raw/source_output.npy"
      - "research_assets/runs/mirror-y-rate-upgrade/raw/follow_up_output.npy"
      - "research_assets/runs/mirror-y-rate-upgrade/raw/mapped_output.npy"
    wording_allowed: >
      For the real eval mesh the rubric classified the exact mirror-y equivariance relation
      as out-of-relation-domain from measured geometry (reflection non-bijective; worst
      reflected-node mismatch about one mesh edge length; cylinder off-centre by -7.2 mm)
      and downgraded it to an approximate OOD-stress probe. Within the same SUT and
      checkpoint, scored by the predeclared MR card formula, the approximate mirror-y
      OOD-stress probe failed on 10 of 10 recorded eval frames (0-9), each violation
      standing about 3-5.5x above its same-space mapping-error floor (median relative L2
      0.737, median ratio 3.96); no frame was skipped, out-of-relation-domain at the probe
      level, or inconclusive. This shows a genuinely trained, converged surrogate can still
      substantially violate a physically-motivated reflection symmetry across every recorded
      eval frame of this trajectory.
    wording_forbidden:
      - "The SUT fails mirror-y in general."
      - "A geometry-independent, cross-SUT, or reliability-implying mirror-y violation rate."
      - "Mirror-y is a valid exact relation for this mesh."
      - "The model is unreliable, or any baseline comparison or accuracy result."
      - "This is not a reliability, accuracy, baseline, multi-SUT, exact-symmetry, or geometry-independent claim."
    blocked_reason: null

  - claim_id: "C7-conservation-diagnostic"
    status: "observed"
    scope: "one-SUT / one-MR (discrete divergence) / two-eval-frame reference-relative diagnostic"
    evidence:
      - "research_assets/runs/conservation-diagnostic-pilot/manifest.yml"
      - "research_assets/runs/conservation-diagnostic-pilot/raw/conservation_report.json"
      - "research_assets/runs/conservation-diagnostic-pilot/raw/metric_ledger.json"
      - "research_assets/runs/conservation-diagnostic-pilot/raw/predicted_next_velocity.npy"
      - "research_assets/runs/conservation-diagnostic-pilot/raw/reference_next_velocity.npy"
    wording_allowed: >
      A P1 discrete divergence operator yields a non-negligible divergence even for the
      ground-truth field on this coarse mesh (dimensionless reference divergence ~0.037),
      so an absolute divergence-free tolerance is not calibratable and the absolute mass-
      conservation relation remains deferred. As a reference-relative diagnostic, the
      surrogate's predicted next-state discrete divergence stayed within ~0.4-0.8% of the
      ground-truth field's on two eval frames (all-cell ratio 1.0025 and 1.0044; interior-
      only ratio over 3183/3612 cells 1.0042 and 1.0075, regression threshold 1.5): pass on
      both. The interior-only ratio rules out a boundary-imposition artefact, so the
      surrogate does not degrade mass conservation relative to the data representation on
      these frames.
    wording_forbidden:
      - "The surrogate is divergence-free or conserves mass exactly."
      - "Absolute mass conservation has been verified."
      - "A conservation or violation rate has been measured."
      - "The model is reliable, accurate, or superior to any baseline."
    blocked_reason: null

  - claim_id: "C8-rollout-accuracy-baseline"
    status: "observed"
    scope: "one-SUT / one-checkpoint / one eval trajectory / one-step next-state accuracy diagnostic"
    evidence:
      - "research_assets/runs/rollout-accuracy-baseline/manifest.yml"
      - "research_assets/runs/rollout-accuracy-baseline/raw/metric_ledger.json"
    wording_allowed: >
      On the same single eval trajectory used by the mirror-y OOD-stress probe, the
      surrogate's one-step next-state prediction error (v_pred = v_t + denormalized
      predicted delta) has median relative L2 0.0216 (min 0.0116, max 0.0788) over the
      9 recorded transitions. The mirror-y OOD-stress violation (median relative L2
      0.737) is about 34x this in-distribution one-step accuracy, so ordinary rollout
      accuracy does not bound the magnitude of the symmetry-relation violation: the two
      diagnostics answer different validation questions on this SUT.
    wording_forbidden:
      - "The surrogate is accurate, reliable, or stable in general."
      - "A free-running multi-step rollout-stability result has been measured."
      - "A baseline-superiority, multi-trajectory, or cross-SUT accuracy claim."
    blocked_reason: null

  - claim_id: "C9-mirror-y-exact-symmetric-mesh"
    status: "observed"
    scope: "one-SUT / one-checkpoint / one synthetic symmetric mesh / one input state / exact mirror-y equivariance"
    evidence:
      - "research_assets/runs/mirror-y-symmetric-mesh/manifest.yml"
      - "research_assets/runs/mirror-y-symmetric-mesh/raw/metric_ledger.json"
      - "research_assets/runs/mirror-y-symmetric-mesh/raw/source_output.npy"
      - "research_assets/runs/mirror-y-symmetric-mesh/raw/follow_up_output.npy"
      - "research_assets/runs/mirror-y-symmetric-mesh/raw/mapped_output.npy"
    wording_allowed: >
      On a synthetic structured channel mesh that is exactly symmetric about y=0
      (bijective reflection, node-type match 1.0, reflection offset < 1e-12, edge-set
      invariant under reflection), the rubric admits the exact mirror-y relation rather
      than downgrading it. The surrogate violated exact mirror-y equivariance with
      relative L2 = 1.10 (verdict fail) on one constructed input state. Because
      equivariance is a structural property that a mirror-equivariant model would satisfy
      to machine precision regardless of accuracy, the nonzero result is a genuine
      learned-symmetry violation, not a geometric or accuracy artifact. This complements
      the asymmetric-mesh OOD-stress probe by removing the out-of-relation-domain
      objection: the exact relation is admissible here and still fails.
    wording_forbidden:
      - "The model is unreliable or inaccurate in general."
      - "This is a cylinder-flow accuracy result (the synthetic mesh has no obstacle and is out-of-distribution)."
      - "A cross-SUT, multi-input, multi-mesh, or geometry-independent symmetry-violation rate."
      - "Exact mirror-y holds for the real DeepMind eval mesh."
    blocked_reason: null

  - claim_id: "C10-seeded-fault-detection"
    status: "observed"
    scope: "one-SUT / one-checkpoint / one eval trajectory / 10-mutant injected-fault catalogue / 3 domain-validity MRs as detectors"
    evidence:
      - "research_assets/runs/seeded-fault-detection/manifest.yml"
      - "research_assets/runs/seeded-fault-detection/raw/metric_ledger.json"
      - "tools/run_seeded_fault_detection.py"
    wording_allowed: >
      Using the paper's own domain-validity MRs as fault detectors against a 10-mutant,
      five-class seeded-fault catalogue (re-implemented from the read-only Minimum-MR-SubSet
      witness taxonomy), the conservation (continuity) MR detected boundary-condition and
      gross normalization-scale faults (3/10), the mirror-y (symmetry) MR detected a
      physical-channel and a mesh-adjacency fault (2/10), and node-permutation equivariance
      detected none (these faults preserve node-relabeling invariance, so the MR stays exact
      by design); 5 of 10 mutants were detected by at least one MR. Detections localize by MR
      class: continuity -> boundary/scale faults, symmetry -> physical-channel/adjacency
      faults. This is a bounded, honest fault-detection result that also delimits where these
      MRs are insensitive (subtle per-step update faults whose effect on the scored quantity
      is small).
    wording_forbidden:
      - "A real-world fault-detection rate or a general fault-detection-rate claim."
      - "The MRs detect all or most faults, or are superior to any baseline detector."
      - "A reliability, cross-SUT, multi-checkpoint, or localization-accuracy claim beyond this catalogue."
      - "node-permutation equivariance is useless (it is exact-by-design here, not broken)."
    blocked_reason: null


  - claim_id: "C43-knife-edge-blind-region"
    status: "observed"
    scope: "PC_zero_vy node-index-selected partial-vy-zeroing severity sweep on the converged PointMLP SUT (fractions 0.1 to 1.0): the geometric MR detector blind region is the exactly-uniform fraction / one SUT, one checkpoint, one trajectory / descriptive, not extrapolated to untested fault classes"
    evidence:
      - "tools/run_three_arm_complementarity_pointmlp.py"
      - "tests/test_three_arm_complementarity.py"
      - "research_assets/runs/pointmlp-three-arm-complementarity/raw/metric_ledger.json"
    wording_allowed: >
      Sweeping the PC_zero_vy fault as a node-index-selected partial vy-zeroing on the converged
      PointMLP SUT, the validity-gated MR suite detects every partial fraction from 0.1 to 0.99
      and misses only the exactly-uniform fraction 1.0: node-permutation equivariance catches the
      index-selected zeroing because it is not relabeling-invariant, and only the uniform zeroing
      becomes permutation-invariant and escapes. The blind region is therefore a measure-zero
      knife-edge -- a fault becomes invisible to a geometric detector exactly when it enters the
      detector's own invariance -- which any partial severity exposes. This reproduces, on a
      second (row-wise) architecture, the knife-edge symmetry blind spot first reported on the
      MGN roster (C13).
    wording_forbidden:
      - "The knife-edge blind region extrapolates to untested fault classes or other detectors."
      - "A real-world or reliability fault-detection rate."
      - "Any baseline superiority claim."
    blocked_reason: >
      One converged SUT, one checkpoint, one eval trajectory, one parametric fault. The knife-edge
      is descriptive for this fault and detector set; it is not extrapolated to other fault
      classes, and it asserts no reliability or superiority. It reproduces the MGN C13 finding on
      a second architecture, it does not generalize it.



ledger_id: "mgn-cylinder-flow-claim-ledger-v0.1"
evidence_policy: "fail-closed"

claims:
  - claim_id: "C1-fixture-asset-path"
    status: "observed"
    evidence:
      - "research_assets/runs/node_permutation_fixture_verdict.json"
      - "research_assets/fixtures/node_permutation_case.json"
    wording_allowed: >
      The current package includes an executable fixture-level node-permutation asset path
      and records its transformation-metric ledger.
    wording_forbidden:
      - "The MeshGraphNets SUT has been evaluated."
      - "The MR has empirical SUT pass/fail evidence."
    blocked_reason: null

  - claim_id: "C2-real-sut-verdicts"
    status: "observed"
    scope: "one-SUT / one-MR / single-source-case pilot"
    evidence:
      - "research_assets/runs/real-sut-node-permutation-pilot/manifest.yml"
      - "research_assets/runs/real-sut-node-permutation-pilot/raw/metric_ledger.json"
      - "research_assets/runs/real-sut-node-permutation-pilot/raw/source_output.npy"
      - "research_assets/runs/real-sut-node-permutation-pilot/raw/follow_up_output.npy"
      - "research_assets/runs/real-sut-node-permutation-pilot/raw/mapped_output.npy"
    wording_allowed: >
      As a single-SUT, single-MR pilot, one real trained MeshGraphNets cylinder-flow
      surrogate (from the read-only Minimum-MR-SubSet repository, checkpoint sha256
      cf281f85...b04a9) was executed on one eval-split source case under the node
      permutation equivariance metamorphic relation. The inverse-mapped follow-up output
      equalled the source output (relative L2 = 0.0, tolerance 1e-6), giving a pass
      verdict for that one case.
    wording_forbidden:
      - "The SUT passes the MR in general."
      - "A pass/fail rate or violation rate has been measured."
      - "Model reliability has been established."
      - "More than one SUT, MR, or source case has been evaluated."
    blocked_reason: null

  - claim_id: "C3-baseline-comparison"
    status: "blocked"
    evidence: []
    wording_allowed: >
      The comparative baselines remain protocol commitments: Manual expert MR design,
      Generic automatic MR generation scope contrast, and LLM-generated candidate MRs.
      The rollout-accuracy diagnostic is no longer a commitment only: it has been executed
      (see C8-rollout-accuracy-baseline) and is reported as a same-SUT diagnostic
      comparator, not as a defeated competitor.
    wording_forbidden:
      - "The proposed protocol outperforms any baseline."
      - "Expert-MR, generic-MR, or LLM baseline comparison results are available."
    blocked_reason: "No matched expert-MR, generic-MR, or LLM baseline run artifacts or scoring ledgers exist; only the rollout-accuracy diagnostic (C8) has been run."

  - claim_id: "C4-rubric-decision-coverage"
    status: "qualified"
    evidence:
      - "research_assets/rubric/domain_validity_rubric.json"
      - "research_assets/mr_cards/node_permutation_equivariance.json"
      - "research_assets/mr_cards/mirror_y_equivariance.json"
      - "research_assets/mr_cards/discrete_divergence_boundedness.json"
    wording_allowed: >
      The asset package contains design-time MR cards and a domain-validity rubric that make
      evidence boundaries explicit.
    wording_forbidden:
      - "The rubric proves physical validity."
      - "Design-time review is an empirical SUT result."
    blocked_reason: "Runtime evidence remains separate from design-time rubric coverage."

  - claim_id: "C5-precondition-check"
    status: "observed"
    evidence:
      - "research_assets/experiments/experiment-ledger.yml"
      - "tools/validate_experiment_protocol.py"
    wording_allowed: >
      On 2026-06-05 the required real-SUT environment variables (METBENCH_MGN_DATA_ROOT,
      METBENCH_MGN_REPO, METBENCH_MGN_CHECKPOINT) were verified unset, and a fail-closed
      artifact gate keeps the three METBENCH-planned SUTs (Echowve, PhysicsNeMo, third
      implementation) blocked. The executed pilots use a separate artifact-gated path
      (vendored checkpoint verified by sha256), not these environment variables.
    wording_forbidden:
      - "The MeshGraphNets SUT was executed and produced verdicts."
      - "Real SUT inference is unblocked."
    blocked_reason: null

  - claim_id: "C6-mirror-y-ood-stress"
    status: "observed"
    scope: "one-SUT / one-checkpoint / one-MR (mirror-y) / bounded within-SUT frame-level approximate OOD-stress rate over one eval trajectory's 10 frames"
    evidence:
      - "research_assets/runs/mirror-y-ood-stress-pilot/raw/precondition_report.json"
      - "research_assets/runs/mirror-y-rate-upgrade/manifest.yml"
      - "research_assets/runs/mirror-y-rate-upgrade/raw/metric_ledger.json"
      - "research_assets/runs/mirror-y-rate-upgrade/raw/source_output.npy"
      - "research_assets/runs/mirror-y-rate-upgrade/raw/follow_up_output.npy"
      - "research_assets/runs/mirror-y-rate-upgrade/raw/mapped_output.npy"
    wording_allowed: >
      For the real eval mesh the rubric classified the exact mirror-y equivariance relation
      as out-of-relation-domain from measured geometry (reflection non-bijective; worst
      reflected-node mismatch about one mesh edge length; cylinder off-centre by -7.2 mm)
      and downgraded it to an approximate OOD-stress probe. Within the same SUT and
      checkpoint, scored by the predeclared MR card formula, the approximate mirror-y
      OOD-stress probe failed on 10 of 10 recorded eval frames (0-9), each violation
      standing about 3-5.5x above its same-space mapping-error floor (median relative L2
      0.737, median ratio 3.96); no frame was skipped, out-of-relation-domain at the probe
      level, or inconclusive. This shows a genuinely trained, converged surrogate can still
      substantially violate a physically-motivated reflection symmetry across every recorded
      eval frame of this trajectory.
    wording_forbidden:
      - "The SUT fails mirror-y in general."
      - "A geometry-independent, cross-SUT, or reliability-implying mirror-y violation rate."
      - "Mirror-y is a valid exact relation for this mesh."
      - "The model is unreliable, or any baseline comparison or accuracy result."
      - "This is not a reliability, accuracy, baseline, multi-SUT, exact-symmetry, or geometry-independent claim."
    blocked_reason: null

  - claim_id: "C7-conservation-diagnostic"
    status: "observed"
    scope: "one-SUT / one-MR (discrete divergence) / two-eval-frame reference-relative diagnostic"
    evidence:
      - "research_assets/runs/conservation-diagnostic-pilot/manifest.yml"
      - "research_assets/runs/conservation-diagnostic-pilot/raw/conservation_report.json"
      - "research_assets/runs/conservation-diagnostic-pilot/raw/metric_ledger.json"
      - "research_assets/runs/conservation-diagnostic-pilot/raw/predicted_next_velocity.npy"
      - "research_assets/runs/conservation-diagnostic-pilot/raw/reference_next_velocity.npy"
    wording_allowed: >
      A P1 discrete divergence operator yields a non-negligible divergence even for the
      ground-truth field on this coarse mesh (dimensionless reference divergence ~0.037),
      so an absolute divergence-free tolerance is not calibratable and the absolute mass-
      conservation relation remains deferred. As a reference-relative diagnostic, the
      surrogate's predicted next-state discrete divergence stayed within ~0.4-0.8% of the
      ground-truth field's on two eval frames (all-cell ratio 1.0025 and 1.0044; interior-
      only ratio over 3183/3612 cells 1.0042 and 1.0075, regression threshold 1.5): pass on
      both. The interior-only ratio rules out a boundary-imposition artefact, so the
      surrogate does not degrade mass conservation relative to the data representation on
      these frames.
    wording_forbidden:
      - "The surrogate is divergence-free or conserves mass exactly."
      - "Absolute mass conservation has been verified."
      - "A conservation or violation rate has been measured."
      - "The model is reliable, accurate, or superior to any baseline."
    blocked_reason: null

  - claim_id: "C8-rollout-accuracy-baseline"
    status: "observed"
    scope: "one-SUT / one-checkpoint / one eval trajectory / one-step next-state accuracy diagnostic"
    evidence:
      - "research_assets/runs/rollout-accuracy-baseline/manifest.yml"
      - "research_assets/runs/rollout-accuracy-baseline/raw/metric_ledger.json"
    wording_allowed: >
      On the same single eval trajectory used by the mirror-y OOD-stress probe, the
      surrogate's one-step next-state prediction error (v_pred = v_t + denormalized
      predicted delta) has median relative L2 0.0216 (min 0.0116, max 0.0788) over the
      9 recorded transitions. The mirror-y OOD-stress violation (median relative L2
      0.737) is about 34x this in-distribution one-step accuracy, so ordinary rollout
      accuracy does not bound the magnitude of the symmetry-relation violation: the two
      diagnostics answer different validation questions on this SUT.
    wording_forbidden:
      - "The surrogate is accurate, reliable, or stable in general."
      - "A free-running multi-step rollout-stability result has been measured."
      - "A baseline-superiority, multi-trajectory, or cross-SUT accuracy claim."
    blocked_reason: null

  - claim_id: "C9-mirror-y-exact-symmetric-mesh"
    status: "observed"
    scope: "one-SUT / one-checkpoint / one synthetic symmetric mesh / one input state / exact mirror-y equivariance"
    evidence:
      - "research_assets/runs/mirror-y-symmetric-mesh/manifest.yml"
      - "research_assets/runs/mirror-y-symmetric-mesh/raw/metric_ledger.json"
      - "research_assets/runs/mirror-y-symmetric-mesh/raw/source_output.npy"
      - "research_assets/runs/mirror-y-symmetric-mesh/raw/follow_up_output.npy"
      - "research_assets/runs/mirror-y-symmetric-mesh/raw/mapped_output.npy"
    wording_allowed: >
      On a synthetic structured channel mesh that is exactly symmetric about y=0
      (bijective reflection, node-type match 1.0, reflection offset < 1e-12, edge-set
      invariant under reflection), the rubric admits the exact mirror-y relation rather
      than downgrading it. The surrogate violated exact mirror-y equivariance with
      relative L2 = 1.10 (verdict fail) on one constructed input state. Because
      equivariance is a structural property that a mirror-equivariant model would satisfy
      to machine precision regardless of accuracy, the nonzero result is a genuine
      learned-symmetry violation, not a geometric or accuracy artifact. This complements
      the asymmetric-mesh OOD-stress probe by removing the out-of-relation-domain
      objection: the exact relation is admissible here and still fails.
    wording_forbidden:
      - "The model is unreliable or inaccurate in general."
      - "This is a cylinder-flow accuracy result (the synthetic mesh has no obstacle and is out-of-distribution)."
      - "A cross-SUT, multi-input, multi-mesh, or geometry-independent symmetry-violation rate."
      - "Exact mirror-y holds for the real DeepMind eval mesh."
    blocked_reason: null

  - claim_id: "C10-seeded-fault-detection"
    status: "observed"
    scope: "one-SUT / one-checkpoint / one eval trajectory / 10-mutant injected-fault catalogue / 3 domain-validity MRs as detectors"
    evidence:
      - "research_assets/runs/seeded-fault-detection/manifest.yml"
      - "research_assets/runs/seeded-fault-detection/raw/metric_ledger.json"
      - "tools/run_seeded_fault_detection.py"
    wording_allowed: >
      Using the paper's own domain-validity MRs as fault detectors against a 10-mutant,
      five-class seeded-fault catalogue (re-implemented from the read-only Minimum-MR-SubSet
      witness taxonomy), the conservation (continuity) MR detected boundary-condition and
      gross normalization-scale faults (3/10), the mirror-y (symmetry) MR detected a
      physical-channel and a mesh-adjacency fault (2/10), and node-permutation equivariance
      detected none (these faults preserve node-relabeling invariance, so the MR stays exact
      by design); 5 of 10 mutants were detected by at least one MR. Detections localize by MR
      class: continuity -> boundary/scale faults, symmetry -> physical-channel/adjacency
      faults. This is a bounded, honest fault-detection result that also delimits where these
      MRs are insensitive (subtle per-step update faults whose effect on the scored quantity
      is small).
    wording_forbidden:
      - "A real-world fault-detection rate or a general fault-detection-rate claim."
      - "The MRs detect all or most faults, or are superior to any baseline detector."
      - "A reliability, cross-SUT, multi-checkpoint, or localization-accuracy claim beyond this catalogue."
      - "node-permutation equivariance is useless (it is exact-by-design here, not broken)."
    blocked_reason: null

  - claim_id: "C11-multicheckpoint-replication"
    status: "observed"
    scope: "one-architecture-family / one-dataset / K=6 checkpoints (S0..S3 = seed-replica family base config; S4 = hidden=128; S5 = num_layers=6)"
    evidence:
      - "docs/superpowers/plans/2026-06-06-empirical-enhancement-E1E2E3.md"
      - "tools/e1_multicheckpoint_runner.py"
      - "tools/train_config_variant.py"
      - "research_assets/runs/multicheckpoint/e1_aggregate.json"
      - "research_assets/runs/multicheckpoint/S0/"
      - "research_assets/runs/multicheckpoint/S1/"
      - "research_assets/runs/multicheckpoint/S2/"
      - "research_assets/runs/multicheckpoint/S3/"
      - "research_assets/runs/multicheckpoint/S4/"
      - "research_assets/runs/multicheckpoint/S5/"
    wording_allowed: >
      Across six MeshGraphNets cylinder-flow checkpoints of one architecture family
      (four base-config seed replicas S0-S3 and two configuration variants S4=hidden=128,
      S5=num_layers=6), the per-MR verdicts are stable: node-permutation equivariance is
      exact (relative L2 = 0.0) on every checkpoint; the mirror-y OOD-stress probe
      reports a median relative L2 of 0.77 (S0-S3 bootstrap 95% CI [0.74, 0.80];
      S4=0.76, S5=0.83); exact mirror-y on the synthetic admissible mesh fails on every
      checkpoint (relative L2 around 1.0); the reference-relative conservation ratio sits
      at 1.01 (CI [1.007, 1.011]); and in-distribution one-step rollout median relative L2
      is 0.022 (CI [0.0217, 0.0224]). The mirror-y violation magnitude is approximately
      35x the in-distribution rollout error on every checkpoint. This is a
      cross-checkpoint / cross-configuration replication across one architecture family
      on one dataset.
    wording_forbidden:
      - "Cross-SUT generalization, cross-architecture-family generalization, or geometry-independent rates."
      - "A real-world fault-detection or reliability claim."
      - "The base-config seed family stands in for an independent SUT sample."
    blocked_reason: null

  - claim_id: "C12-operator-floor-resolution"
    status: "observed"
    scope: "one mesh family (y=0-symmetric structured triangular channel), four resolutions h0..h0/8, one smooth analytic stream-function field"
    evidence:
      - "tools/run_operator_floor_sweep.py"
      - "tools/conservation_rubric.py"
      - "research_assets/runs/operator-floor-sweep/operator_floor_report.json"
    wording_allowed: >
      On a y=0-symmetric structured triangular channel mesh at four resolutions
      (h0, h0/2, h0/4, h0/8), the area-weighted RMS of the P1 constant-per-cell
      discrete divergence operator applied to the analytically divergence-free
      reference velocity field u = (psi_y, -psi_x) with psi(x,y) = sin(pi x / Lx)
      sin(pi y / Ly) decays at a log-log slope of 0.988 (all cells) / 0.995
      (interior cells), R-squared = 1.000, matching the theoretical O(h) truncation
      rate of P1 piecewise-linear shape functions on smooth fields. This empirically
      calibrates the operator-floor magnitude that the verdict tolerance must
      dominate under the admissibility predicate (numerical decidability).
    wording_forbidden:
      - "Generalization across mesh families, geometries, or analytic fields."
      - "An absolute divergence-free tolerance claim on the real DeepMind eval mesh."
    blocked_reason: null

  - claim_id: "C13-fault-detection-robustness"
    status: "observed"
    scope: "K=6 checkpoints / 10-mutant injected-fault catalogue / 3 domain-validity MR detectors / 5 input-permutation seeds / NS_double_scale severity grid {1.1, 1.25, 1.5, 2.0, 4.0} / PC_zero_vy partial-fraction grid {0.25, 0.5, 0.75, 1.0}"
    evidence:
      - "tools/run_e3_fault_robustness.py"
      - "research_assets/runs/fault-robustness-e3/fault_robustness_report.json"
    wording_allowed: >
      Replaying the 10-mutant five-class seeded-fault catalogue against the K=6 checkpoint
      roster yields stable per-mutant cross-SUT detection rates with Wilson 95% CIs; the
      severity sweep on NS_double_scale s in {1.1, 1.25, 1.5, 2.0, 4.0} and on PC_zero_vy
      partial-fraction p in {0.25, 0.5, 0.75, 1.0} shows monotone-non-decreasing detection
      versus severity. Detection localizes by MR class (continuity -> boundary/scale;
      symmetry -> physical-channel/adjacency; node-permutation is exact-by-design and
      flags none of these mutants). This bounds the detector sensitivity of these
      domain-validity MRs against this catalogue across the family, and is not a
      real-world fault-detection rate.
    wording_forbidden:
      - "A real-world fault-detection rate or general baseline-superiority claim."
      - "Cross-SUT (cross-architecture-family) generalization."
    blocked_reason: null

speculative_claims:
  - claim: "General seeded-fault detection effectiveness"
    status: "partially-observed"
    wording_allowed: >
      A bounded result now exists (see C10-seeded-fault-detection and
      C13-fault-detection-robustness): the MRs detect 5/10 mutants of one injected-fault
      catalogue on one SUT, and the rate is stable at 5/10 across the seed-replica
      family and 4/10 across the capacity/depth variants in the K=6 roster, with severity
      sweeps showing monotone-non-decreasing detection. General fault-detection
      effectiveness across architecture families and real-world faults remains future work.
    blocked_reason: "K=6 checkpoints share one architecture family / one dataset; one injected-fault catalogue."

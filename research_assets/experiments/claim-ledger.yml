  - claim_id: "C3-baseline-comparison"
    status: "observed"
    scope: "Expert-MR baseline (3 expert-LLMs, 25 candidates, 3-rater majority vote, 76% rejection/deferral, 0 novel retained), LLM-MR baseline (one gpt-5.5 generator, eight candidates, three vendor-disjoint raters), and generic-MR baseline (13-template domain-blind catalogue) all executed and scored by the predicate."
    evidence:
      - "tools/run_expert_mr_baseline.py"
      - "tools/patch_expert_rater.py"
      - "research_assets/runs/expert-mr-baseline/expert_proposals.json"
      - "research_assets/runs/expert-mr-baseline/expert_rated_candidates.json"
      - "research_assets/runs/expert-mr-baseline/expert_baseline_report.json"
      - "tools/run_llm_mr_baseline.py"
      - "tools/rate_llm_mr_baseline.py"
      - "tools/score_llm_mr_baseline.py"
      - "tools/run_generic_mr_baseline.py"
      - "tests/test_p2_llm_baseline.py"
      - "research_assets/runs/llm-mr-baseline/llm_candidates.json"
      - "research_assets/runs/llm-mr-baseline/llm_votes.json"
      - "research_assets/runs/llm-mr-baseline/llm_baseline_report.json"
      - "research_assets/runs/generic-mr-baseline/generic_mr_report.json"
    wording_allowed: >
      The comparative baselines are secondary scope contrasts: LLM-simulated expert MR
      elicitation, Generic automatic MR generation scope contrast, and LLM-generated
      candidate MRs. The rollout-accuracy diagnostic has been executed (see
      C8-rollout-accuracy-baseline) and is reported as a same-SUT diagnostic comparator,
      not as a defeated competitor. For the LLM-generated-MR baseline the
      execution pipeline is now committed and reproducible-by-protocol in three stages
      with vendor-disjoint LLMs: tools/run_llm_mr_baseline.py asks one generator
      (claude-opus-4-8 with gpt-5.5 fallback, via the bltcy OpenAI-compatible
      gateway) for K=8 candidate MRs at temperature=0; tools/rate_llm_mr_baseline.py
      then collects three INDEPENDENT validity votes per candidate from three
      vendor-disjoint LLMs (glm-5.1, kimi-k2.6, deepseek-v4-flash - explicitly NOT
      the generator's vendor, to avoid self-preference) on a 3-class label
      {valid, borderline, invalid}, persisting the raw votes, Fleiss kappa,
      raw pointwise agreement, item-unanimous rate, and a constant-rater screen
      that excludes any rater that emits a single label across all candidates;
      tools/score_llm_mr_baseline.py grades each candidate against this paper's
      four-condition admissibility predicate AND merges the three-LLM majority
      verdict, reporting the cross-tab (admitted-by-predicate AND panel-valid).
      One execution has been recorded: generator gpt-5.5 (opus-4-8 was
      rate-limited and skipped) at max_tokens=12000 produced 8 candidates; the
      three vendor-disjoint raters all voted, with no constant rater detected.
      Results: 8/8 candidates satisfied the four-condition admissibility predicate
      on their self-declared fields, 7/8 reached panel-majority "valid", and 6/8
      overlap thematically with one of this paper's three MRs (2 node-permutation,
      1 mirror-y, 4 conservation; one centerline-reflection candidate split the
      panel valid/borderline/invalid for the same non-bijectivity reason this paper
      downgrades mirror-y to OOD-stress). Inter-rater raw-PRA 0.79 and
      item-unanimous 0.75; Fleiss kappa 0.077 (the small-sample paradox under
      near-unanimity, documented in the sibling Minimum-MR-SubSet rubric).
      This is one generator call, eight candidates, three raters - a bounded
      result, not a generative-model benchmark and not a method-vs-LLM
      superiority claim. Separately, a deterministic generic-MR scope contrast over a 13-template
      domain-blind catalogue admits 3/13 (node-permutation, edge-reorder,
      conservation), all coinciding with this paper's MRs, rejecting 10 with stated
      reasons (dominant: no physical/software basis, 9); this is the empirical form of
      the rubric-value question, not a claim that generic generation is useless.
    wording_forbidden:
      - "The proposed protocol outperforms any baseline."
      - "An LLM-vs-method superiority or general LLM-MR-generation quality claim."
      - "A generative-model benchmark or LLM-quality ranking."
      - "The expert-MR baseline proves the rubric is necessary (it shows an admissibility gap, not necessity)."
    blocked_reason: null


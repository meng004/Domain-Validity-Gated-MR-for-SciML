ledger_id: "mgn-cylinder-flow-claim-ledger-v0.1"
evidence_policy: "fail-closed"

claims:
  - claim_id: "C1-fixture-asset-path"
    status: "observed"
    evidence:
      - "research_assets/runs/node_permutation_fixture_verdict.json"
      - "research_assets/fixtures/node_permutation_case.json"
    wording_allowed: >
      The current package includes an executable fixture-level node-permutation asset path
      and records its transformation-metric ledger.
    wording_forbidden:
      - "The MeshGraphNets SUT has been evaluated."
      - "The MR has empirical SUT pass/fail evidence."
    blocked_reason: null

  - claim_id: "C2-real-sut-verdicts"
    status: "observed"
    scope: "one-SUT / one-MR / single-source-case pilot"
    evidence:
      - "research_assets/runs/real-sut-node-permutation-pilot/manifest.yml"
      - "research_assets/runs/real-sut-node-permutation-pilot/raw/metric_ledger.json"
      - "research_assets/runs/real-sut-node-permutation-pilot/raw/source_output.npy"
      - "research_assets/runs/real-sut-node-permutation-pilot/raw/follow_up_output.npy"
      - "research_assets/runs/real-sut-node-permutation-pilot/raw/mapped_output.npy"
    wording_allowed: >
      As a single-SUT, single-MR pilot, one real trained MeshGraphNets cylinder-flow
      surrogate (from the read-only Minimum-MR-SubSet repository, checkpoint sha256
      cf281f85...b04a9) was executed on one eval-split source case under the node
      permutation equivariance metamorphic relation. The inverse-mapped follow-up output
      equalled the source output (relative L2 = 0.0, tolerance 1e-6), giving a pass
      verdict for that one case.
    wording_forbidden:
      - "The SUT passes the MR in general."
      - "A pass/fail rate or violation rate has been measured."
      - "Model reliability has been established."
      - "More than one SUT, MR, or source case has been evaluated."
    blocked_reason: null

  - claim_id: "C3-baseline-comparison"
    status: "blocked"
    evidence: []
    wording_allowed: >
      Baselines are protocol commitments: Manual expert MR design, Generic automatic MR generation
      scope contrast, LLM-generated candidate MRs, and Pure rollout accuracy.
    wording_forbidden:
      - "The proposed protocol outperforms any baseline."
      - "Baseline comparison results are available."
    blocked_reason: "No matched baseline run artifacts, scoring ledgers, or comparable outputs exist."

  - claim_id: "C4-rubric-decision-coverage"
    status: "qualified"
    evidence:
      - "research_assets/rubric/domain_validity_rubric.json"
      - "research_assets/mr_cards/node_permutation_equivariance.json"
      - "research_assets/mr_cards/mirror_y_equivariance.json"
      - "research_assets/mr_cards/discrete_divergence_boundedness.json"
    wording_allowed: >
      The asset package contains design-time MR cards and a domain-validity rubric that make
      evidence boundaries explicit.
    wording_forbidden:
      - "The rubric proves physical validity."
      - "Design-time review is an empirical SUT result."
    blocked_reason: "Runtime evidence remains separate from design-time rubric coverage."

  - claim_id: "C5-precondition-check"
    status: "observed"
    evidence:
      - "research_assets/experiments/experiment-ledger.yml"
      - "tools/validate_experiment_protocol.py"
    wording_allowed: >
      On 2026-06-05 the required real-SUT environment variables (METBENCH_MGN_DATA_ROOT,
      METBENCH_MGN_REPO, METBENCH_MGN_CHECKPOINT) were verified unset, and a fail-closed
      artifact gate keeps the three METBENCH-planned SUTs (Echowve, PhysicsNeMo, third
      implementation) blocked. The executed pilots use a separate artifact-gated path
      (vendored checkpoint verified by sha256), not these environment variables.
    wording_forbidden:
      - "The MeshGraphNets SUT was executed and produced verdicts."
      - "Real SUT inference is unblocked."
    blocked_reason: null

  - claim_id: "C6-mirror-y-ood-stress"
    status: "observed"
    scope: "one-SUT / one-checkpoint / one-MR (mirror-y) / bounded within-SUT frame-level approximate OOD-stress rate over one eval trajectory's 10 frames"
    evidence:
      - "research_assets/runs/mirror-y-ood-stress-pilot/raw/precondition_report.json"
      - "research_assets/runs/mirror-y-rate-upgrade/manifest.yml"
      - "research_assets/runs/mirror-y-rate-upgrade/raw/metric_ledger.json"
      - "research_assets/runs/mirror-y-rate-upgrade/raw/source_output.npy"
      - "research_assets/runs/mirror-y-rate-upgrade/raw/follow_up_output.npy"
      - "research_assets/runs/mirror-y-rate-upgrade/raw/mapped_output.npy"
    wording_allowed: >
      For the real eval mesh the rubric classified the exact mirror-y equivariance relation
      as out-of-relation-domain from measured geometry (reflection non-bijective; worst
      reflected-node mismatch about one mesh edge length; cylinder off-centre by -7.2 mm)
      and downgraded it to an approximate OOD-stress probe. Within the same SUT and
      checkpoint, scored by the predeclared MR card formula, the approximate mirror-y
      OOD-stress probe failed on 10 of 10 recorded eval frames (0-9), each violation
      standing about 3-5.5x above its same-space mapping-error floor (median relative L2
      0.737, median ratio 3.96); no frame was skipped, out-of-relation-domain at the probe
      level, or inconclusive. This shows a genuinely trained, converged surrogate can still
      substantially violate a physically-motivated reflection symmetry across every recorded
      eval frame of this trajectory.
    wording_forbidden:
      - "The SUT fails mirror-y in general."
      - "A geometry-independent, cross-SUT, or reliability-implying mirror-y violation rate."
      - "Mirror-y is a valid exact relation for this mesh."
      - "The model is unreliable, or any baseline comparison or accuracy result."
    blocked_reason: null

  - claim_id: "C7-conservation-diagnostic"
    status: "observed"
    scope: "one-SUT / one-MR (discrete divergence) / two-eval-frame reference-relative diagnostic"
    evidence:
      - "research_assets/runs/conservation-diagnostic-pilot/manifest.yml"
      - "research_assets/runs/conservation-diagnostic-pilot/raw/conservation_report.json"
      - "research_assets/runs/conservation-diagnostic-pilot/raw/metric_ledger.json"
      - "research_assets/runs/conservation-diagnostic-pilot/raw/predicted_next_velocity.npy"
      - "research_assets/runs/conservation-diagnostic-pilot/raw/reference_next_velocity.npy"
    wording_allowed: >
      A P1 discrete divergence operator yields a non-negligible divergence even for the
      ground-truth field on this coarse mesh (dimensionless reference divergence ~0.037),
      so an absolute divergence-free tolerance is not calibratable and the absolute mass-
      conservation relation remains deferred. As a reference-relative diagnostic, the
      surrogate's predicted next-state discrete divergence stayed within ~0.4-0.8% of the
      ground-truth field's on two eval frames (all-cell ratio 1.0025 and 1.0044; interior-
      only ratio over 3183/3612 cells 1.0042 and 1.0075, regression threshold 1.5): pass on
      both. The interior-only ratio rules out a boundary-imposition artefact, so the
      surrogate does not degrade mass conservation relative to the data representation on
      these frames.
    wording_forbidden:
      - "The surrogate is divergence-free or conserves mass exactly."
      - "Absolute mass conservation has been verified."
      - "A conservation or violation rate has been measured."
      - "The model is reliable, accurate, or superior to any baseline."
    blocked_reason: null

speculative_claims:
  - claim: "Seeded-fault detection effectiveness"
    status: "speculative"
    wording_allowed: "May be listed only as a future experiment."
    blocked_reason: "No seeded-fault subjects, commands, or outputs exist."

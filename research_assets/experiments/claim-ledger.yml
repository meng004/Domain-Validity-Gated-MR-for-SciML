  - claim_id: "C12-operator-floor-resolution"
    status: "observed"
    scope: "one mesh family (y=0-symmetric structured triangular channel), nine resolutions h0*2..h0/16, one smooth analytic stream-function field"
    evidence:
      - "tools/run_operator_floor_sweep.py"
      - "tools/run_operator_floor_sweep_extended.py"
      - "tools/conservation_rubric.py"
      - "research_assets/runs/operator-floor-sweep/operator_floor_report.json"
      - "research_assets/runs/operator-floor-sweep-extended/operator_floor_extended_report.json"
    wording_allowed: >
      On a y=0-symmetric structured triangular channel mesh at nine resolutions
      (h0*2, h0, h0/2, h0/3, h0/4, h0/6, h0/8, h0/12, h0/16; 220 to 245,120 cells),
      the area-weighted RMS of the P1 constant-per-cell discrete divergence operator
      applied to the analytically divergence-free reference velocity field
      u = (psi_y, -psi_x) with psi(x,y) = sin(pi x / Lx) sin(pi y / Ly) decays at a
      log-log slope of 0.984 with standard error 0.003 and Student-t 95% CI
      [0.975, 0.992] (all cells; interior cells: 0.989, 95% CI [0.982, 0.997]),
      R-squared = 0.9999, consistent with the theoretical O(h) truncation rate of
      P1 piecewise-linear shape functions on smooth fields. The original 4-point
      sweep (slope 0.988 / 0.995, R-squared = 1.000) is a subset of this grid.
      This empirically calibrates the operator-floor magnitude that the verdict
      tolerance must dominate under the admissibility predicate (numerical
      decidability).
    wording_forbidden:
      - "Generalization across mesh families, geometries, or analytic fields."
      - "An absolute divergence-free tolerance claim on the real DeepMind eval mesh."
      - "A closed-form bound for arbitrary unstructured meshes (the concrete-mesh closed-form floor is C32-operator-floor-analytic-bound; a general unstructured guarantee remains future work)."
    blocked_reason: null

  - claim_id: "C13-fault-detection-robustness"
    status: "observed"
    scope: "K=6 checkpoints / 10-mutant injected-fault catalogue plus 2 adversarial mutants / 3 domain-validity MR detectors / 5 input-permutation seeds / NS_double_scale severity grid {1.1, 1.25, 1.5, 2.0, 4.0} / PC_zero_vy partial-fraction grid {0.25, 0.5, 0.75, 0.85, 0.9, 0.95, 0.99, 1.0}"
    evidence:
      - "tools/run_e3_fault_robustness.py"
      - "tools/run_e3_adversarial_mutants.py"
      - "research_assets/runs/fault-robustness-e3/fault_robustness_report.json"
      - "research_assets/runs/adversarial-mutants-e3-extra/adversarial_mutants_report.json"
    wording_allowed: >
      Replaying the 10-mutant five-class seeded-fault catalogue against the K=6 checkpoint
      roster yields stable per-mutant cross-SUT detection rates with Wilson 95% CIs; the
      severity sweep on NS_double_scale s in {1.1, 1.25, 1.5, 2.0, 4.0} stays at 0/6, and
      the refined PC_zero_vy partial-fraction sweep p in {0.25, 0.5, 0.75, 0.85, 0.9, 0.95,
      0.99, 1.0} shows a knife-edge: 6/6 detection (via the node-permutation detector, since
      index-selected partial zeroing is not relabeling-invariant) at every p up to 0.99, and
      0/6 only at the exactly-uniform p = 1.0, where the fault is simultaneously permutation-
      invariant and mirror-symmetric and escapes all geometric detectors. Two adversarial
      mutants (R4) confirm the blind region is a subspace rather than a point: A2
      (delta_vx += 0.05 * vy^2, invariant under all three detectors) escapes every detector
      on every checkpoint (any-detector 0/6), and A1 (delta_vx += 0.05) is flagged only by
      mirror-y on 6/6 - node-permutation 0/6 and conservation 0/6 - because A1 shifts the
      magnitude of the mirror-y violation beyond the 0.5 relative-change threshold, not
      because it breaks any symmetry. A2 stays below that threshold by three orders of

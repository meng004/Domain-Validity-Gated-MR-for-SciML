    output_summary:
      primary: null
      allowed_observation: >
        A P1 discrete divergence operator gives a non-negligible divergence even for the
        ground-truth field (dimensionless reference divergence ~0.037), so an absolute
        divergence-free tolerance is not calibratable and the absolute relation stays
        deferred. As a reference-relative diagnostic, the surrogate's predicted next-state
        divergence stays within ~0.4-0.8% of the reference field's on two eval frames
        (all-cell ratio 1.0025 and 1.0044; interior-only ratio 1.0042 and 1.0075,
        regression threshold 1.5): verdict pass on both. The interior-only ratio rules out
        a boundary-imposition artefact.
    claim_limit: >
      Pilot diagnostic evidence: one SUT, one MR, two eval frames. The absolute mass-
      conservation relation remains deferred; this is reference-relative only and
      establishes no absolute conservation, conservation rate, reliability, accuracy, or
      baseline result.


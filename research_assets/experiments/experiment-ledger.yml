    relation_metric_value: 0.0
    tolerance_threshold: 0.000001
    verdict: "pass"
    output_summary:
      primary: null
      allowed_observation: >
        One real MeshGraphNets cylinder-flow SUT executed one metamorphic relation
        (node permutation equivariance) on one source case (eval-split frame 0, 1923
        nodes, 11070 edges). Inverse-mapped follow-up output equals the source output
        (relative L2 = 0.0, tolerance 1e-6), verdict pass.
    claim_limit: >
      Pilot evidence only: one SUT, one MR, one source case. It does not establish a
      pass/fail rate, model reliability, baseline superiority, or seeded-fault detection.

  - run_id: "real-sut-mirror-y-ood-stress-pilot-001"
    status: "observed"
    sut_execution: "run"
    evidence_level: "real-sut-single-mr-ood-stress-pilot"
    subject: "MeshGraphNets cylinder-flow surrogate (Minimum-MR-SubSet repo, read-only)"
    sut_repo: "/home/user/Minimum-MR-SubSet"
    sut_repo_provenance: "meng004/Minimum-MR-SubSet merged PR #103 (cylinder-flow MGN runtime witness)"
    sut_commit: "8c0b7ef3605fd9452884d701e2a191a2b14a5a35"
    checkpoint_sha256: "cf281f85941ff21ff86af0122924299d7b71a375f50f118e725eda1e859b04a9"
    manifest: "research_assets/runs/mirror-y-ood-stress-pilot/manifest.yml"
    mr_card: "research_assets/mr_cards/mirror_y_equivariance.json"
    metric_ledger: "research_assets/runs/mirror-y-ood-stress-pilot/raw/metric_ledger.json"
    precondition_report: "research_assets/runs/mirror-y-ood-stress-pilot/raw/precondition_report.json"
    raw_output_dir: "research_assets/runs/mirror-y-ood-stress-pilot/raw"
    raw_outputs:
      - "research_assets/runs/mirror-y-ood-stress-pilot/raw/source_output.npy"
      - "research_assets/runs/mirror-y-ood-stress-pilot/raw/follow_up_output.npy"
      - "research_assets/runs/mirror-y-ood-stress-pilot/raw/mapped_output.npy"
    stdout_log: "research_assets/runs/mirror-y-ood-stress-pilot/raw/stdout.log"
    stderr_log: "research_assets/runs/mirror-y-ood-stress-pilot/raw/stderr.log"
    command: "python3 -B tools/run_mirror_y_ood_stress.py --manifest research_assets/runs/mirror-y-ood-stress-pilot/manifest.yml --frames 0,4"
    exit_code: 0
    mirror_axis: 0.205
    relation_metric: "mirror_y_relative_l2_error"
    relation_verdict_exact: "out-of-relation-domain"
    rubric_decision: "retained-ood-stress"
    ood_stress_verdict: "fail"
    mirror_equivariance_violation_rel_l2_frame0: 0.6914
    mirror_equivariance_violation_rel_l2_frame4: 0.7494
    mapping_error_floor_frame0: 0.1943
    mapping_error_floor_frame4: 0.1952
    output_summary:
      primary: null
      allowed_observation: >
        On the real eval mesh the exact mirror-y relation is out-of-relation-domain
        (reflection is non-bijective; worst reflected-node mismatch about one mesh edge
        length; cylinder off-centre by -7.2 mm), so the rubric downgrades it to an
        approximate OOD-stress probe. Using the MR card formula (un-mirror the follow-up,
        normalise by the source norm), on two eval frames (0 and 4) the SUT's mirror-y
        equivariance residual is 0.691 and 0.749 relative L2, about 3.6-3.8x the
        same-space mapping-error floor (0.194, 0.195); both frames classify as a violation (fail).
    claim_limit: >
      Pilot OOD-stress evidence: one SUT, one MR, two eval frames, under an approximate
      reflection. It does not establish a violation rate, model reliability, baseline
      superiority, or seeded-fault detection.

  - run_id: "real-sut-conservation-diagnostic-pilot-001"
    status: "observed"
    sut_execution: "run"
    evidence_level: "real-sut-single-mr-conservation-diagnostic-pilot"
    subject: "MeshGraphNets cylinder-flow surrogate (Minimum-MR-SubSet repo, read-only)"
    sut_repo: "/home/user/Minimum-MR-SubSet"
    sut_repo_provenance: "meng004/Minimum-MR-SubSet merged PR #103 (cylinder-flow MGN runtime witness)"
    sut_commit: "8c0b7ef3605fd9452884d701e2a191a2b14a5a35"
    checkpoint_sha256: "cf281f85941ff21ff86af0122924299d7b71a375f50f118e725eda1e859b04a9"
    manifest: "research_assets/runs/conservation-diagnostic-pilot/manifest.yml"
    mr_card: "research_assets/mr_cards/discrete_divergence_boundedness.json"
    metric_ledger: "research_assets/runs/conservation-diagnostic-pilot/raw/metric_ledger.json"
    conservation_report: "research_assets/runs/conservation-diagnostic-pilot/raw/conservation_report.json"
    raw_output_dir: "research_assets/runs/conservation-diagnostic-pilot/raw"
    raw_outputs:
      - "research_assets/runs/conservation-diagnostic-pilot/raw/predicted_next_velocity.npy"
      - "research_assets/runs/conservation-diagnostic-pilot/raw/reference_next_velocity.npy"
      - "research_assets/runs/conservation-diagnostic-pilot/raw/cell_divergence_pred.npy"
      - "research_assets/runs/conservation-diagnostic-pilot/raw/cell_divergence_reference.npy"
    stdout_log: "research_assets/runs/conservation-diagnostic-pilot/raw/stdout.log"
    stderr_log: "research_assets/runs/conservation-diagnostic-pilot/raw/stderr.log"
    command: "python3 -B tools/run_conservation_diagnostic.py --manifest research_assets/runs/conservation-diagnostic-pilot/manifest.yml --frames 0,4"
    exit_code: 0
    relation_metric: "divergence_pred_over_reference_ratio"
    absolute_relation_status: "deferred-uncalibrated-absolute-tolerance"
    diagnostic_verdict: "pass"
    divergence_ratio_frame0: 1.0025
    divergence_ratio_frame4: 1.0044
    divergence_ratio_interior_frame0: 1.0042
    divergence_ratio_interior_frame4: 1.0075
    reference_nondim_divergence_mean: 0.0372
    boundary_condition_note: "inflow (Dirichlet, frame+1) and wall (no-slip) nodes are prescribed and match the reference; the interior-only ratio over 3183/3612 cells isolates the bulk field"
    output_summary:
      primary: null
      allowed_observation: >
        A P1 discrete divergence operator gives a non-negligible divergence even for the
        ground-truth field (dimensionless reference divergence ~0.037), so an absolute
        divergence-free tolerance is not calibratable and the absolute relation stays
        deferred. As a reference-relative diagnostic, the surrogate's predicted next-state
        divergence stays within ~0.4-0.8% of the reference field's on two eval frames
        (all-cell ratio 1.0025 and 1.0044; interior-only ratio 1.0042 and 1.0075,
        regression threshold 1.5): verdict pass on both. The interior-only ratio rules out
        a boundary-imposition artefact.
    claim_limit: >
      Pilot diagnostic evidence: one SUT, one MR, two eval frames. The absolute mass-
      conservation relation remains deferred; this is reference-relative only and
      establishes no absolute conservation, conservation rate, reliability, accuracy, or
      baseline result.


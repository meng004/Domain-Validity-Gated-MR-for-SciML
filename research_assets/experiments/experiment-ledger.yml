ledger_id: "mgn-cylinder-flow-experiment-ledger-v0.1"
evidence_policy: "fail-closed"
keep_failed_runs: true
claim_limitations: >
  This ledger separates fixture-level asset plumbing from real MeshGraphNets SUT execution.
  It does not record real SUT verdicts, empirical rates, model reliability, seeded-fault
  detection, or baseline comparison results.

precondition_check:
  checked_on: "2026-06-05"
  method: "inspected METBENCH_MGN_* environment variables in the execution environment and enforced the validator real-SUT precondition gate"
  required_env:
    - "METBENCH_MGN_DATA_ROOT"
    - "METBENCH_MGN_REPO"
    - "METBENCH_MGN_CHECKPOINT"
  observed_state: "all three required environment variables were UNSET at check time"
  consequence: >
    The three METBENCH_MGN_*-planned SUTs (Echowve, PhysicsNeMo, third implementation)
    stay blocked with sut_execution not-run. The gate is now an artifact gate: a real-sut
    run may only be observed when it references a run manifest whose checkpoint sha256,
    raw outputs, and metric ledger verify on disk.
  separate_pilot: >
    Independently of METBENCH_MGN_*, run real-sut-cylinder-flow-mgn-node-permutation-pilot-001
    executed against a vendored real MeshGraphNets cylinder-flow checkpoint (sha256
    cf281f85...b04a9) from the read-only Minimum-MR-SubSet repository (PR #103); its
    artifacts verify, so the artifact gate admits it as observed pilot evidence.
  enforced_by: "tools/validate_experiment_protocol.py:validate_real_sut_preconditions"
  evidence_limit: "The environmental observation itself is not MeshGraphNets inference and yields no SUT verdict; the pilot verdict comes only from the executed run artifacts."

runs:
  - run_id: "fixture-node-permutation-run-001"
    status: "observed-fixture-only"
    sut_execution: "not-run"
    evidence_level: "fixture-transform-metric-only"
    observed_artifact: "research_assets/runs/node_permutation_fixture_verdict.json"
    fixture_input: "research_assets/fixtures/node_permutation_case.json"
    mr_card: "research_assets/mr_cards/node_permutation_equivariance.json"
    output_summary:
      primary: null
      allowed_observation: "The fixture asset path and transformation-metric ledger exist."
    claim_limit: "May support asset-plumbing existence only; cannot be written as real SUT Results."

  - run_id: "real-sut-cylinder-flow-mgn-node-permutation-pilot-001"
    status: "observed"
    sut_execution: "run"
    evidence_level: "real-sut-single-mr-pilot"
    subject: "MeshGraphNets cylinder-flow surrogate (Minimum-MR-SubSet repo, read-only)"
    sut_repo: "/home/user/Minimum-MR-SubSet"
    sut_repo_provenance: "meng004/Minimum-MR-SubSet merged PR #103 (cylinder-flow MGN runtime witness)"
    sut_commit: "8c0b7ef3605fd9452884d701e2a191a2b14a5a35"
    checkpoint_sha256: "cf281f85941ff21ff86af0122924299d7b71a375f50f118e725eda1e859b04a9"
    manifest: "research_assets/runs/real-sut-node-permutation-pilot/manifest.yml"
    mr_card: "research_assets/mr_cards/node_permutation_equivariance.json"
    metric_ledger: "research_assets/runs/real-sut-node-permutation-pilot/raw/metric_ledger.json"
    raw_output_dir: "research_assets/runs/real-sut-node-permutation-pilot/raw"
    raw_outputs:
      - "research_assets/runs/real-sut-node-permutation-pilot/raw/source_output.npy"
      - "research_assets/runs/real-sut-node-permutation-pilot/raw/follow_up_output.npy"
      - "research_assets/runs/real-sut-node-permutation-pilot/raw/mapped_output.npy"
    stdout_log: "research_assets/runs/real-sut-node-permutation-pilot/raw/stdout.log"
    stderr_log: "research_assets/runs/real-sut-node-permutation-pilot/raw/stderr.log"
    command: "python3 -B tools/run_real_sut_mr.py --manifest research_assets/runs/real-sut-node-permutation-pilot/manifest.yml --frame 0"
    exit_code: 0
    relation_metric: "permutation_relative_l2_error"
    relation_metric_value: 0.0
    tolerance_threshold: 0.000001
    verdict: "pass"
    output_summary:
      primary: null
      allowed_observation: >
        One real MeshGraphNets cylinder-flow SUT executed one metamorphic relation
        (node permutation equivariance) on one source case (eval-split frame 0, 1923
        nodes, 11070 edges). Inverse-mapped follow-up output equals the source output
        (relative L2 = 0.0, tolerance 1e-6), verdict pass.
    claim_limit: >
      Pilot evidence only: one SUT, one MR, one source case. It does not establish a
      pass/fail rate, model reliability, baseline superiority, or seeded-fault detection.

  - run_id: "real-sut-mirror-y-ood-stress-pilot-001"
    status: "observed"
    sut_execution: "run"
    evidence_level: "real-sut-single-mr-ood-stress-pilot"
    subject: "MeshGraphNets cylinder-flow surrogate (Minimum-MR-SubSet repo, read-only)"
    sut_repo: "/home/user/Minimum-MR-SubSet"
    sut_repo_provenance: "meng004/Minimum-MR-SubSet merged PR #103 (cylinder-flow MGN runtime witness)"
    sut_commit: "8c0b7ef3605fd9452884d701e2a191a2b14a5a35"
    checkpoint_sha256: "cf281f85941ff21ff86af0122924299d7b71a375f50f118e725eda1e859b04a9"
    manifest: "research_assets/runs/mirror-y-ood-stress-pilot/manifest.yml"
    mr_card: "research_assets/mr_cards/mirror_y_equivariance.json"
    metric_ledger: "research_assets/runs/mirror-y-ood-stress-pilot/raw/metric_ledger.json"
    precondition_report: "research_assets/runs/mirror-y-ood-stress-pilot/raw/precondition_report.json"
    raw_output_dir: "research_assets/runs/mirror-y-ood-stress-pilot/raw"
    raw_outputs:
      - "research_assets/runs/mirror-y-ood-stress-pilot/raw/source_output.npy"
      - "research_assets/runs/mirror-y-ood-stress-pilot/raw/follow_up_output.npy"
      - "research_assets/runs/mirror-y-ood-stress-pilot/raw/mapped_output.npy"
    stdout_log: "research_assets/runs/mirror-y-ood-stress-pilot/raw/stdout.log"
    stderr_log: "research_assets/runs/mirror-y-ood-stress-pilot/raw/stderr.log"
    command: "python3 -B tools/run_mirror_y_ood_stress.py --manifest research_assets/runs/mirror-y-ood-stress-pilot/manifest.yml --frames 0,4"
    exit_code: 0
    mirror_axis: 0.205
    relation_metric: "mirror_y_relative_l2_error"
    relation_verdict_exact: "out-of-relation-domain"
    rubric_decision: "retained-ood-stress"
    ood_stress_verdict: "fail"
    mirror_equivariance_violation_rel_l2_frame0: 0.6834
    mirror_equivariance_violation_rel_l2_frame4: 0.7345
    mapping_error_floor_frame0: 0.1505
    mapping_error_floor_frame4: 0.1494
    output_summary:
      primary: null
      allowed_observation: >
        On the real eval mesh the exact mirror-y relation is out-of-relation-domain
        (reflection is non-bijective; worst reflected-node mismatch about one mesh edge
        length; cylinder off-centre by -7.2 mm), so the rubric downgrades it to an
        approximate OOD-stress probe. On two eval frames (0 and 4) the SUT's mirror-y
        equivariance residual is 0.683 and 0.735 relative L2, about 4.5-4.9x the
        mapping-error floor (0.150, 0.149); both frames classify as a violation (fail).
    claim_limit: >
      Pilot OOD-stress evidence: one SUT, one MR, two eval frames, under an approximate
      reflection. It does not establish a violation rate, model reliability, baseline
      superiority, or seeded-fault detection.

